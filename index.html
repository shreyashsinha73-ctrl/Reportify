<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportify - Hyperlocal Civic Agent</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f6f8; }
        #sidebar { width: 350px; padding: 20px; background: white; box-shadow: 2px 0 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; }
        h2 { margin-top: 0; color: #1a73e8; }
        input, textarea, button { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; height: 100px; }
        button { background: #1a73e8; color: white; font-weight: bold; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        .coordinates { font-size: 0.85em; color: #5f6368; background: #e8eaed; padding: 8px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Reportify</h2>
        <p style="font-size: 0.9em; color: #5f6368;">Click anywhere on the map to pinpoint an infrastructure or sanitation issue, then describe it below.</p>
        
        <div class="coordinates" id="coord-display">No location selected</div>
        
        <input type="hidden" id="lat">
        <input type="hidden" id="lng">
        
        <textarea id="description" placeholder="Describe the issue (e.g., 'Large pothole near the main market square blocking the left lane, dangerous for bikers.')"></textarea>
        <button onclick="submitReport()">File Smart Report</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map centered near a default city coordinate (e.g., Bangalore center)
        const map = L.map('map').setView([12.9716, 77.5946], 13);
        
        // Load OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let currentMarker = null;

        // Capture map clicks to fetch exact latitude and longitude
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
            document.getElementById('coord-display').innerText = `Selected Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`;
            
            if (currentMarker) {
                map.removeLayer(currentMarker);
            }
            currentMarker = L.marker([lat, lng]).addTo(map);
        });

        async function submitReport() {
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            const description = document.getElementById('description').value;

            if (!lat || !lng || !description) {
                alert("Please drop a pin on the map and write a brief description first.");
                return;
            }

            try {
                const response = await fetch('/api/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ latitude: parseFloat(lat), longitude: parseFloat(lng), description: description })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert(`Report analyzed by Civic Agent!\nCategory: ${result.ticket.category}\nPriority: ${result.ticket.priority}`);
                    
                    // Add the permanent AI-categorized ticket to the map interface
                    L.marker([lat, lng])
                        .addTo(map)
                        .bindPopup(`<b>${result.ticket.title}</b><br>Priority: ${result.ticket.priority}<br>Category: ${result.ticket.category}`)
                        .openPopup();
                        
                    // Reset input elements
                    document.getElementById('description').value = '';
                } else {
                    alert("Submission failed: " + result.error);
                }
            } catch (err) {
                console.error(err);
                alert("Error sending report to backend.");
            }
        }
    </script>
</body>
</html>
